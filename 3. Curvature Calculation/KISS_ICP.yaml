#Tuned for M1P as it is the most detailed Lidar.
adaptive_threshold:
  fixed_threshold: null
  initial_threshold: 0.5
  min_motion_th: 0.05
data:
  deskew: false
  max_range: 40.0
  min_range: 1.0
mapping:
  max_points_per_voxel: 20
  voxel_size: 0.3
out_dir: results
registration:
  convergence_criterion: 0.0001
  max_num_iterations: 500
  max_num_threads: 0